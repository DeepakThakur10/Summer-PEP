<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Todo</title>
</head>
<body>
    <main>
        <h1>Todo App</h1>
        <section>
            <h2>Add Todo</h2>
            <form>
                <div>
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="give title">
                </div>
                <div>
                    <label for="desc">Description</label>
                    <textarea name="" id="desc" placeholder="enter description"></textarea>
                </div>
                <button type="submit" id="btn">ADD</button>
            </form>
        </section>
        <section>
            <h2>Todo List</h2>
            <ul id="todos"></ul>
        </section>
    </main>
        
</body>
<script src = "script.js"></script>
</html>
